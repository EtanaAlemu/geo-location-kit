name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache dr5hn JSON downloads
        uses: actions/cache@v4
        with:
          path: geo-db-builder/build/dr5hn
          key: dr5hn-v1-${{ hashFiles('geo-db-builder/src/main/kotlin/com/etanaalemu/geo/dbbuilder/LocationDatabaseBuilder.kt') }}
          restore-keys: |
            dr5hn-v1-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: JVM and unit tests
        run: >
          ./gradlew
          :geo-core:test
          :geo-db-builder:test
          :geo-compose:test
          --no-daemon

      - name: Assemble demo app (generates location.db if missing)
        run: ./gradlew :app:assembleDebug -Pgeo.usePublished=false --no-daemon
